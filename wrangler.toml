name = "routewise-mcp"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets — set via `wrangler secret put` or the Cloudflare dashboard:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_DEVELOPER_PRICE_ID
#   wrangler secret put STRIPE_TEAM_PRICE_ID
#   wrangler secret put RESEND_API_KEY           (optional — welcome email)
#   wrangler secret put APP_BASE_URL             (optional — defaults to https://whichmodel.dev)

# KV namespace for API key cache (sha256(key) → {key_id, plan, monthly_limit, revoked}, 5-min TTL)
[[kv_namespaces]]
binding = "API_KEYS"
id = "e3a172189e1c4f50af2828011063be98"

[observability]
enabled = true
